<!DOCTYPE html>
<html lang="pt-br">

<head>

  <!-- ================= META ================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ================= TITLE ================= -->
  <title>Casa Trívia</title>

  <!-- ================= STYLE ================= -->
  <style>

  /* ================= RESET ================= */
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  /* ================= BODY ================= */
  body{
    font-family: Georgia, serif;
    background:#F6F1EA;
    color:#1C1C1C;
  }

  /* ================= HEADER ================= */
  .header{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    background:#3F4A33;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
  }

  .brand{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    letter-spacing:0.2em;
    font-size:12px;
    color:#B08D57;
  }

  /* ================= HERO ================= */
  .hero{
    margin-top:120px;
    text-align:center;
  }

  .hero h1{
    font-size:48px;
  }

  .hero p{
    font-size:12px;
    letter-spacing:0.2em;
  }

  /* ================= CARRINHO ================= */
  .cart{
    position:relative;
    cursor:pointer;
  }

  .cart svg{
    width:20px;
    height:20px;
    stroke:#B08D57;
    fill:none;
  }

  #cartCount{
    position:absolute;
    top:-6px;
    right:-8px;
    background:#E67E22;
    color:#fff;
    font-size:10px;
    padding:2px 6px;
    border-radius:10px;
  }

  /* ================= PRODUTO ================= */
  .product{
    padding:60px 20px;
  }

  .product-card{
    max-width:300px;
    margin:auto;
  }

  .product-img{
    width:100%;
  }

  .product-actions{
    display:flex;
    gap:10px;
    margin-top:10px;
  }

  /* ================= BOTÕES ================= */
  .buy-btn{
    flex:1;
    padding:10px;
    border:none;
    background:#1C1C1C;
    color:#fff;
    cursor:pointer;
  }

  .cart-btn{
    width:44px;
    height:44px;
    border-radius:50%;
    border:1px solid rgba(139,111,71,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    cursor:pointer;
    transition:0.3s;
  }

  .cart-btn:hover{
    background:#3F4A33;
  }

  .cart-btn:hover svg{
    stroke:#fff;
  }

  /* ================= QUANTIDADE ================= */
  .qty{
    display:flex;
    gap:10px;
    margin-top:10px;
  }

  .qty div{
    border:1px solid rgba(0,0,0,0.2);
    padding:5px 10px;
    cursor:pointer;
  }

  /* ================= WHATSAPP ================= */
  .whatsapp-float{
    position:fixed;
    bottom:25px;
    right:25px;
    width:55px;
    height:55px;
    background:#3F4A33;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
  }

  .whatsapp-float svg{
    width:26px;
    height:26px;
    fill:#fff;
  }

  </style>

</head>


<body>

<!-- ================= HEADER ================= -->
<header class="header">

  <div>☰</div>

  <div class="brand">Casa Trívia</div>

  <div class="cart" onclick="Cart.open()">
    <svg viewBox="0 0 24 24">
      <path d="M6 6h15l-1.5 9h-12z"></path>
      <circle cx="9" cy="20" r="1.5"></circle>
      <circle cx="18" cy="20" r="1.5"></circle>
    </svg>
    <div id="cartCount">0</div>
  </div>

</header>


<!-- ================= HERO ================= -->
<section class="hero">
  <h1>Casa Trívia</h1>
  <p>arquitetura olfativa da memória</p>
</section>


<!-- ================= PRODUTO ================= -->
<section class="product">

  <div class="product-card">

    <img src="https://via.placeholder.com/300" class="product-img">

    <h3>Chá Branco & Baunilha</h3>
    <div class="price">R$ 119</div>

    <div class="product-actions">

      <button class="buy-btn">Comprar</button>

      <button class="cart-btn" onclick="Cart.add('Chá Branco',119,this)">
        <svg viewBox="0 0 24 24">
          <path d="M6 6h15l-1.5 9h-12z"></path>
          <circle cx="9" cy="20" r="1.5"></circle>
          <circle cx="18" cy="20" r="1.5"></circle>
        </svg>
      </button>

    </div>

    <div class="qty">
      <div onclick="Qty.dec(this)">−</div>
      <div class="qty-value">1</div>
      <div onclick="Qty.inc(this)">+</div>
    </div>

  </div>

</section>


<!-- ================= WHATSAPP ================= -->
<a 
href="https://wa.me/5512988890464?text=Olá,%20vim%20pelo%20site%20e%20gostaria%20de%20mais%20informações."
class="whatsapp-float"
target="_blank">

  <svg viewBox="0 0 24 24">
    <path d="M20 11.5a8.5 8.5 0 0 1-15.5 5.5L3 21l4-1.5A8.5 8.5 0 1 1 20 11.5z"/>
  </svg>

</a>


<!-- ================= SCRIPT ================= -->
<script>

/* ================= CARRINHO ================= */
const Cart = {

  items: [],

  open(){
    console.log("Abrir carrinho futuramente");
  },

  add(name, price, el){

    let card = el.closest(".product-card");
    let qty = parseInt(card.querySelector(".qty-value").innerText);

    let existing = this.items.find(i => i.name === name);

    if(existing){
      existing.qty += qty;
    } else {
      this.items.push({ name, price, qty });
    }

    this.updateCount();

    console.log(this.items);
  },

  updateCount(){

    let total = 0;

    this.items.forEach(i => total += i.qty);

    document.getElementById("cartCount").innerText = total;

  }

};


/* ================= QUANTIDADE ================= */
const Qty = {

  inc(el){
    let valueEl = el.parentElement.querySelector(".qty-value");
    valueEl.innerText = parseInt(valueEl.innerText) + 1;
  },

  dec(el){
    let valueEl = el.parentElement.querySelector(".qty-value");
    let val = parseInt(valueEl.innerText);

    if(val > 1){
      valueEl.innerText = val - 1;
    }
  }

};

</script>

</body>
</html>
