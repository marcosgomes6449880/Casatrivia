<header style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:14px 22px;
  background:rgba(246,241,234,0.82);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.05);
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:space-between;
">

  <!-- MENU HAMBURGUER (ESQUERDA) -->
  <div style="font-size:22px; cursor:pointer;">
    ☰
  </div>

  <!-- LOGO CENTRAL -->
  <div style="
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
  ">

    <img src="logo.png" style="
      height:95px;
      width:auto;
      display:block;
      margin:0 auto;
      object-fit:contain;
    " alt="Casa Trívia">

    <div style="
      margin-top:6px;
      font-size:12px;
      letter-spacing:0.35em;
      text-transform:uppercase;
      font-family: Georgia, serif;
    ">
      Casa Trívia
    </div>

  </div>

  <!-- ÍCONES DIREITA -->
  <div style="
    display:flex;
    align-items:center;
    gap:18px;
    font-size:18px;
  ">
    <span style="cursor:pointer;">🔍</span>
    <span style="cursor:pointer;">🛒</span>
  </div>

</header>
