<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Trívia</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #F6F1EA;
      color: #1C1C1C;
    }

    header {
      padding: 20px;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 12px;
    }

    .hero {
      height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    .products {
      display: grid;
      gap: 20px;
      padding: 20px;
    }

    .card {
      border: 1px solid #00000020;
      padding: 20px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid black;
      background: transparent;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>Casa Trívia — Fragrance Atelier</header>

<section class="hero">
  <h1>Casa Trívia</h1>
  <p>Luxury Botanical Candles</p>
</section>

<section class="products">

  <div class="card">
    <h3>Essential Collection</h3>
    <p>White Tea & Vanilla • Verbena • Cotton Bloom</p>
    <p>R$ 119</p>
    <button>Comprar</button>
  </div>

  <div class="card">
    <h3>Signature Collection</h3>
    <p>Silent Garden • Key Garden • Papaver</p>
    <p>R$ 139</p>
    <button>Comprar</button>
  </div>

  <div class="card">
    <h3>Haute Collection</h3>
    <p>Black Orchid • Amber Vanilla • Secret Garden</p>
    <p>R$ 199</p>
    <button>Comprar</button>
  </div>

</section>

</body>
</html>
